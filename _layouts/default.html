<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  {% if page.math %}
  <script>
    MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
  {% endif %}
</head>
<body>
  <header>
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    </div>
  </header>

  <main class="container">
    {{ content }}
  </main>

  <footer>
    <div class="container">
      <span>© {{ 'now' | date: "%Y" }} {{ site.author.name }}</span>
      <div class="social-links">
        <a href="https://github.com/{{ site.social.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="https://www.linkedin.com/in/{{ site.social.linkedin }}" target="_blank" rel="noopener">LinkedIn</a>
        <a href="https://www.kaggle.com/{{ site.social.kaggle }}" target="_blank" rel="noopener">Kaggle</a>
        <a href="https://x.com/{{ site.social.twitter }}" target="_blank" rel="noopener">Twitter</a>
        <a href="mailto:{{ site.author.email }}">Email</a>
      </div>
    </div>
  </footer>
</body>
</html>
