title: Mrudhuhas
description: Machine Learning Engineer — NLP, LLMs, Production AI
url: 'https://mrudhuhasm.github.io'
baseurl: ''

author:
  name: Mrudhuhas
  email: mrudhuhas@gmail.com

social:
  github: MrudhuhasM
  kaggle: mrudhuhas
  twitter: _mrudhu_
  linkedin: mrudhuhas

permalink: /posts/:title/

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    block:
      line_numbers: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

plugins:
  - jekyll-feed

exclude:
  - LICENSE
  - README.md
  - "*.gemspec"
  - node_modules/
  - vendor/
